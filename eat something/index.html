<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃点啥</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>今天吃点啥</h1>
        <div class="dice-container">
            <div id="dice" class="dice">
                <!-- 六面体骰子的面 -->
                <div class="dice-face">1</div>
                <div class="dice-face">2</div>
                <div class="dice-face">3</div>
                <div class="dice-face">4</div>
                <div class="dice-face">5</div>
                <div class="dice-face">6</div>
            </div>
        </div>
        <button id="roll-btn" class="roll-button">开始投掷</button>
        <div id="result" class="result"></div>
    </div>
    <!-- 骰子投掷音效 -->
    <audio id="roll-sound" preload="auto">
        <source src="骰子滚动音效.mp3" type="audio/mpeg">
     </audio>
    <script src="script.js"></script>
</body>
</html>
